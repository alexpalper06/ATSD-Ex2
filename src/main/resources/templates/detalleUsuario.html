<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments :: head (titulo='User Details')"></head>

<body>
<div th:replace="fragments::navbar"></div>
<div class="container-fluid">

    <div class="row mt-3">
        <div class="col">
            <h2>User Details</h2>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-md-6">
            <div th:if="${user != null}">
                <div class="card">
                    <div class="card-body">
                        <div class="list-group list-group-flush">
                            <div class="list-group-item">
                                <strong>Id:</strong>
                                <span th:text="${user.id}"></span>
                            </div>
                            <div class="list-group-item">
                                <strong>Full Name:</strong>
                                <span th:text="${user.nombre}"></span>
                            </div>
                            <div class="list-group-item">
                                <strong>Email:</strong>
                                <span th:text="${user.email}"></span>
                            </div>
                            <div class="list-group-item">
                                <strong>Date of Birth:</strong>
                                <span th:text="${#dates.format(user.fechaNacimiento, 'dd/MM/yyyy')}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <a class="btn btn-primary" th:href="@{/registered}">Back to List</a>
                </div>
            </div>

            <div th:if="${user == null}" class="alert alert-danger" role="alert">
                <strong>User not found.</strong> The requested user does not exist.
            </div>
        </div>
    </div>

</div>

<div th:replace="fragments :: javascript"></div>
</body>
</html>
